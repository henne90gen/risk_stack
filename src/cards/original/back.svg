<svg
    xmlns="http://www.w3.org/2000/svg"
    width="250"
    height="350"
    viewBox="0 0 250 350"
>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a2e" />
      <stop offset="1" stop-color="#16213e" />
    </linearGradient>
    <pattern
            id="diamonds"
            x="0"
            y="0"
            width="30"
            height="30"
            patternUnits="userSpaceOnUse"
        >
      <polygon
                points="15,2 28,15 15,28 2,15"
                fill="none"
                stroke="#ffffff"
                stroke-width="1"
                stroke-opacity="0.12"
            />
    </pattern>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e040fb" />
      <stop offset="0.5" stop-color="#7c4dff" />
      <stop offset="1" stop-color="#40c4ff" />
    </linearGradient>
    <linearGradient id="labelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c4dff" stop-opacity="0.85" />
      <stop offset="1" stop-color="#e040fb" stop-opacity="0.85" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="248" height="348" rx="18" fill="url(#bg)" />
  <rect x="1" y="1" width="248" height="348" rx="18" fill="url(#diamonds)" />
  <rect
        x="1"
        y="1"
        width="248"
        height="348"
        rx="18"
        fill="none"
        stroke="#ffffff"
        stroke-width="2"
    />
  <rect
        x="12"
        y="12"
        width="226"
        height="326"
        rx="12"
        fill="none"
        stroke="#ffffff"
        stroke-width="2.5"
        stroke-opacity="0.35"
    />
  <circle
        cx="125"
        cy="175"
        r="88"
        fill="none"
        stroke="url(#shimmer)"
        stroke-width="3"
        stroke-opacity="0.6"
    />
  <circle
        cx="125"
        cy="175"
        r="72"
        fill="none"
        stroke="url(#shimmer)"
        stroke-width="1.5"
        stroke-opacity="0.35"
    />
  <circle cx="125" cy="175" r="60" fill="#ffffff" fill-opacity="0.04" />
  <rect x="62" y="148" width="126" height="54" rx="12" fill="url(#labelBg)" />
  <text
        x="125"
        y="167"
        font-family="Arial, sans-serif"
        font-size="20"
        font-weight="bold"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="4"
        filter="url(#glow)"
    >FLIP</text>
  <text
        x="125"
        y="193"
        font-family="Arial, sans-serif"
        font-size="26"
        font-weight="bold"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="6"
        filter="url(#glow)"
    >7</text>
  <text
        x="24"
        y="44"
        font-family="Arial, sans-serif"
        font-size="22"
        fill="#ffffff"
        fill-opacity="0.5"
    >&#x2726;</text>
  <text
        x="226"
        y="314"
        font-family="Arial, sans-serif"
        font-size="22"
        fill="#ffffff"
        fill-opacity="0.5"
        transform="rotate(180 225 310)"
    >&#x2726;</text>
</svg>
